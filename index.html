<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAMPIRE CINEMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #080808;
      --surface: #111111;
      --line:    rgba(255,255,255,0.07);
      --muted:   rgba(255,255,255,0.25);
      --text:    rgba(255,255,255,0.88);
      --accent:  #c0392b;      /* deep vampire crimson */
    }

    html { font-size: 16px; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Karla', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px 26px;
      border-bottom: 1px solid var(--line);
      position: relative;
      animation: fadeDown 0.6s ease both;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer;
      text-decoration: none;
    }

    .logo-eyebrow {
      font-family: 'Karla', sans-serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }

    /* logo slot — вставьте img вместо текста при необходимости */
    .logo-img-slot {
      display: none; /* показать если есть img */
    }

    /* Telegram button */
    .tg-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 20px;
      border: 1px solid var(--line);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'Karla', sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .tg-btn:hover {
      border-color: rgba(255,255,255,0.22);
      color: #fff;
      background: rgba(255,255,255,0.04);
    }
    .tg-btn i {
      font-size: 15px;
      color: #2AABEE;
      transition: color 0.2s;
    }

    /* ── MAIN ─────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 36px 40px 48px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── PLAYER ───────────────────────────────────────────── */
    .player-wrap {
      position: relative;
      width: 100%;
      animation: fadeUp 0.65s 0.1s ease both;
    }

    .player-frame {
      aspect-ratio: 16/9;
      width: 100%;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .player-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* subtle crimson glow on the bottom edge */
    .player-frame::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.55;
      pointer-events: none;
    }

    /* ── PLACEHOLDER ──────────────────────────────────────── */
    .placeholder {
      display: none;
      aspect-ratio: 16/9;
      width: 100%;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--line);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .placeholder.visible { display: flex; }

    .placeholder-icon {
      width: 52px; height: 52px;
      border: 1px solid var(--line);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .placeholder-icon i { font-size: 20px; color: rgba(255,255,255,0.2); }

    .placeholder h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .placeholder p {
      font-size: 12px;
      color: rgba(255,255,255,0.22);
      line-height: 1.7;
      letter-spacing: 0.04em;
    }
    .placeholder code {
      color: rgba(255,255,255,0.35);
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    /* ── META BAR ─────────────────────────────────────────── */
    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 22px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      gap: 20px;
      flex-wrap: wrap;
      animation: fadeUp 0.65s 0.2s ease both;
    }

    .meta-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(24px, 3.5vw, 40px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1.1;
    }

    .meta-sub {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 5px;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--line);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'Karla', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .share-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

    /* ── AD SLOTS ─────────────────────────────────────────── */
    .ad-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 40px;
      animation: fadeUp 0.65s 0.3s ease both;
    }

    .ad-slot {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 4px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s;
    }
    .ad-slot:hover { border-color: rgba(255,255,255,0.12); }

    .ad-label {
      position: absolute;
      top: 10px; left: 14px;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }

    .ad-slot-inner {
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── ANIMATIONS ───────────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 20px 20px 18px; }
      main   { padding: 24px 20px 40px; }
      .ad-row { grid-template-columns: 1fr; }
      .tg-btn span { display: none; }
      .tg-btn { padding: 10px 14px; }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ──────────────────────────────────────────── -->
  <header>
    <a class="logo-wrap" href="javascript:window.location.reload()">
      <!-- Слот под логотип-изображение (раскомментировать если есть файл) -->
      <!-- <img class="logo-img-slot" src="logo.svg" alt="Vampire Cinema" height="36"> -->
      <span class="logo-eyebrow">Стриминг</span>
      <span class="logo-main">Vampire Cinema</span>
    </a>

    <a href="https://t.me/Vampire_Cinema" target="_blank" rel="noopener" class="tg-btn">
      <i class="fa-brands fa-telegram"></i>
      <span>Телеграм канал</span>
    </a>
  </header>

  <!-- ─── MAIN ────────────────────────────────────────────── -->
  <main>

    <!-- Player -->
    <div class="player-wrap">
      <div class="player-frame" id="player-frame">
        <!-- iframe вставляется через JS -->
      </div>

      <!-- Placeholder (показывается без kpId) -->
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon"><i class="fa-solid fa-film"></i></div>
        <h2>Выберите фильм</h2>
        <p>
          Передайте ID с Кинопоиска в адресную строку<br>
          <code>?kp=1234567</code>
        </p>
      </div>
    </div>

    <!-- Meta -->
    <div class="meta-bar">
      <div>
        <div class="meta-title" id="title">—</div>
        <div class="meta-sub" id="subtitle"></div>
      </div>
      <button class="share-btn" id="share-btn" onclick="shareMovie()">
        <i class="fa-solid fa-arrow-up-from-bracket"></i>
        <span>Поделиться</span>
      </button>
    </div>

    <!-- Ad slots -->
    <div class="ad-row">
      <div class="ad-slot">
        <span class="ad-label">Реклама</span>
        <span class="ad-slot-inner">Рекламный блок 1</span>
      </div>
      <div class="ad-slot">
        <span class="ad-label">Реклама</span>
        <span class="ad-slot-inner">Рекламный блок 2</span>
      </div>
    </div>

  </main>

  <script>
    function getKpId() {
      return new URLSearchParams(window.location.search).get('kp');
    }

    function loadPlayer(kpId) {
      const frame       = document.getElementById('player-frame');
      const placeholder = document.getElementById('placeholder');
      const titleEl     = document.getElementById('title');
      const subtitleEl  = document.getElementById('subtitle');

      if (!kpId) {
        frame.style.display = 'none';
        placeholder.classList.add('visible');
        titleEl.textContent    = 'LLS Vampire Lab';
        subtitleEl.textContent = '';
        return;
      }

      frame.style.display = 'block';
      placeholder.classList.remove('visible');

      const iframe = document.createElement('iframe');
      iframe.src            = `https://kinobox.net/player/?kp=${kpId}`;
      iframe.allowFullscreen = true;
      iframe.scrolling       = 'no';
      iframe.style.cssText   = 'width:100%;height:100%;border:none;display:block;';

      frame.innerHTML = '';
      frame.appendChild(iframe);

      titleEl.textContent    = `Фильм #${kpId}`;
      subtitleEl.textContent = 'HD · 1080p · Русская озвучка';
    }

    function shareMovie() {
      const btn = document.getElementById('share-btn');
      navigator.clipboard.writeText(window.location.href).then(() => {
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check"></i><span>Скопировано</span>';
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      });
    }

    window.addEventListener('DOMContentLoaded', () => loadPlayer(getKpId()));
  </script>
</body>
</html>
